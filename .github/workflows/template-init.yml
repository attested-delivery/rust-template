---
name: Template Init

# Runs on first push after creating a repo from this template.
# Replaces rust_template / rust-template / attested-delivery with the new repo's values.
# Becomes a no-op once Cargo.toml no longer contains 'name = "rust_template"'.
"on":
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: read-all at the top; the init job is granted contents:write
# only because it commits the de-templated files back to the new repo.
permissions:
  contents: read

jobs:
  init:
    name: Initialize from template
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.repository != 'attested-delivery/rust-template'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Check if init is needed
        id: check
        run: |
          if grep -q 'name = "rust_template"' Cargo.toml; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Already initialized — skipping."
          fi

      - name: Derive new names
        if: steps.check.outputs.needed == 'true'
        id: names
        env:
          REPO_FULL: ${{ github.repository }}
        run: |
          OWNER="${REPO_FULL%%/*}"
          REPO="${REPO_FULL##*/}"
          CRATE="$(echo "$REPO" | tr '-' '_')"
          # shellcheck disable=SC2129
          {
            echo "owner=$OWNER"
            echo "repo=$REPO"
            echo "crate=$CRATE"
          } >> "$GITHUB_OUTPUT"
          echo "Renaming: attested-delivery -> $OWNER"
          echo "Renaming: rust-template -> $REPO"
          echo "Renaming: rust_template -> $CRATE"

      - name: Replace template references
        if: steps.check.outputs.needed == 'true'
        env:
          OWNER: ${{ steps.names.outputs.owner }}
          REPO: ${{ steps.names.outputs.repo }}
          CRATE: ${{ steps.names.outputs.crate }}
        run: |
          # Files to transform (skip .github/workflows/, .git/, binaries)
          FILES=$(find . \
            -type f \
            ! -path './.git/*' \
            ! -path './.github/workflows/*' \
            ! -name '*.png' \
            ! -name '*.jpg' \
            ! -name '*.ico' \
            ! -name 'Cargo.lock')

          # Order matters: full path first, then org, then crate names
          for f in $FILES; do
            sed -i \
              -e "s|attested-delivery/rust-template|${OWNER}/${REPO}|g" \
              -e "s|attested-delivery/rust_template|${OWNER}/${CRATE}|g" \
              -e "s|attested-delivery|${OWNER}|g" \
              -e "s|rust-template|${REPO}|g" \
              -e "s|rust_template|${CRATE}|g" \
              "$f" 2>/dev/null || true
          done

      - name: Regenerate Cargo.lock
        if: steps.check.outputs.needed == 'true'
        run: |
          rustup default stable
          cargo generate-lockfile

      - name: Commit changes
        if: steps.check.outputs.needed == 'true'
        env:
          REPO_FULL: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: initialize from rust-template for ${REPO_FULL}"
            git push
          fi
