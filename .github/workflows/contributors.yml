name: Contributor Recognition

on:
  # schedule:
  #   - cron: '0 0 1 * *'  # Monthly on 1st
  workflow_dispatch:

# Least privilege: read-all at the top; the job is granted contents:write
# only because it commits the regenerated CONTRIBUTORS.md back to the repo.
permissions:
  contents: read

jobs:
  update-contributors:
    name: Update Contributors List
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Generate contributors
        run: |
          # shellcheck disable=SC2129,SC2162,SC2126
          {
            echo "# Contributors"
            echo ""
            echo "Thank you to all our contributors!"
            echo ""
            git log --format='%aN <%aE>' | sort -u | grep -v 'github-actions\|dependabot' | while IFS= read -r line; do
              echo "- $line"
            done
            echo ""
            echo "## Statistics"
            echo ""
            echo "- Total contributors: $(git log --format='%aN' | sort -u | grep -v 'github-actions\|dependabot' | grep -c .)"
            echo "- Total commits: $(git rev-list --count HEAD)"
            echo "- First commit: $(git log --reverse --format='%ai' | head -1)"
            echo "- Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          } > CONTRIBUTORS.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if ! git diff --quiet CONTRIBUTORS.md; then
            git add CONTRIBUTORS.md
            git commit -m "chore: update contributors list [skip ci]"
            git push
          fi
